---
- name: Assert required AWS variables are defined
  assert:
    that:
      - aws_region is defined
      - aws_secrets_prefix is defined
    fail_msg: "aws_region ou aws_secrets_prefix n'est pas défini"
  run_once: true
  delegate_to: localhost
  become: false

- name: Read Jenkins admin password from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/jenkins/admin_password
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: jenkins_admin_password_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read SonarQube admin password from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/sonarqube/admin_password
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: sonarqube_admin_password_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read Grafana admin password from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/grafana/admin_password
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: grafana_admin_password_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read DockerHub credentials JSON from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/dockerhub/credentials
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: dockerhub_credentials_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read NVD API key from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/nvd/api_key
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: nvd_api_key_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read TMDB API key from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/tmdb/api_key
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: tmdb_api_key_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Read SonarQube webhook secret from Secrets Manager
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ aws_secrets_prefix }}/sonarqube/webhook_secret
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: sonarqube_webhook_secret_cmd
  changed_when: false
  no_log: true
  run_once: true
  delegate_to: localhost
  become: false

- name: Store secrets as localhost facts
  set_fact:
    jenkins_admin_password: "{{ jenkins_admin_password_cmd.stdout }}"
    sonarqube_admin_password: "{{ sonarqube_admin_password_cmd.stdout }}"
    grafana_admin_password: "{{ grafana_admin_password_cmd.stdout }}"
    dockerhub_credentials: "{{ dockerhub_credentials_cmd.stdout | from_json }}"
    nvd_api_key: "{{ nvd_api_key_cmd.stdout }}"
    tmdb_api_key: "{{ tmdb_api_key_cmd.stdout }}"
    sonarqube_webhook_secret: "{{ sonarqube_webhook_secret_cmd.stdout }}"
  no_log: true
  run_once: true
  delegate_to: localhost
  delegate_facts: true
  become: false